<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Name</title>
  <meta name="description" content="Personal site of Your Name.">
  <link rel="canonical" href="https://www.example.com/">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <meta property="og:title" content="Your Name">
  <meta property="og:description" content="Personal site of Your Name.">
  <meta property="og:url" content="https://www.example.com/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://www.example.com/og-default.png">
  <meta property="og:image:alt" content="Your Name">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Your Name">
  <meta name="twitter:description" content="Personal site of Your Name.">
  <meta name="twitter:image" content="https://www.example.com/og-default.png">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Your Name",
    "url": "https://www.example.com"
  }
  </script>

  <style>
    :root {
      --bg: #fafaf9;
      --fg: #1a1a1a;
      --subtle: #6e6e6e;
      --link: #2563eb;
      --width: 580px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 4rem 1.5rem;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 1rem;
      line-height: 1.65;
    }

    main { max-width: var(--width); margin: 0 auto; }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin: 0 0 0.5rem;
    }

    .tagline {
      color: var(--subtle);
      font-size: 1.125rem;
      margin: 0 0 2.5rem;
    }

    .bio {
      margin: 0 0 2.5rem;
      max-width: 48ch;
    }

    .links {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--link);
      text-decoration: none;
      font-size: 0.9375rem;
    }

    .links a:hover { text-decoration: underline; }

    .links a:focus-visible {
      outline: 2px solid var(--link);
      outline-offset: 2px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Your Name</h1>
    <p class="tagline">What you do, in one line.</p>
    <p class="bio">
      A short bio. A couple of sentences about who you are, what you work on,
      and what you care about.
    </p>
    <ul class="links">
      <li><a href="mailto:you@example.com">Email</a></li>
      <li><a href="https://github.com/yourusername">GitHub</a></li>
      <li><a href="https://twitter.com/yourusername">X / Twitter</a></li>
    </ul>
  </main>
</body>
</html>
